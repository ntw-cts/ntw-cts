name: Update Random GIF
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  update-gif:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git pull --rebase origin main

      - name: Fetch random yuri gif from Giphy
        run: |
          TAGS=(
            "yuri+anime"
            "bocchi+the+rock+anime"
            "bloom+into+you+anime"
            "yuru+yuri+anime"
            "lycoris+recoil"
            "madoka+magica"
            "girls+band+cry+anime"
            "lucky+star+anime"
          )
          TAG="${TAGS[$RANDOM % ${#TAGS[@]}]}"
          echo "Selected tag: $TAG"
          URL=$(curl -s "https://api.giphy.com/v1/gifs/search?api_key=${{ secrets.GIPHY_API_KEY }}&q=${TAG}&rating=pg&limit=3" \
            | python3 -c "import sys,json,random; data=json.load(sys.stdin)['data']; print(random.choice(data)['images']['original']['url'])")
          curl -sL "$URL" -o gif.gif

      - name: Commit and push
        run: |
          git add gif.gif
          git commit --allow-empty -m "chore: update hourly gif [$(date +%s)]"
          git push
