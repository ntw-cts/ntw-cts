name: Update Random GIF
on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:       # lets you trigger it manually too
jobs:
  update-gif:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch random yuri gif from Giphy
        run: |
          URL=$(curl -s "https://api.giphy.com/v1/gifs/search?api_key=${{ secrets.GIPHY_API_KEY }}&q=yuri+anime&rating=pg&limit=50" \
            | python3 -c "import sys,json,random; data=json.load(sys.stdin)['data']; print(random.choice(data)['images']['original']['url'])")
          curl -sL "$URL" -o gif.gif
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add gif.gif
          git diff --cached --quiet || git commit -m "chore: update hourly gif"
          git push
